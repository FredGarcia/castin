; ===================================================================
; AnnotationDEX.config.ini — configuration de la macro AnnotationDEX
; -------------------------------------------------------------------
; Placez ce fichier DANS LE MEME DOSSIER que le DEX a annoter (ou
; renseignez un chemin explicite dans la constante CONFIG_CHEMIN du
; module .bas). S'il est absent, la macro utilise ses valeurs par
; defaut (identiques a celles ci-dessous).
;
; Conseil : conservez des libelles SANS ACCENTS (lecture ANSI).
; ===================================================================

; --- Teintes de BASE, au format hexadecimal RVB (RRGGBB) ------------
; Chaque champ choisit une teinte de base + une NUANCE (voir plus bas).
[couleurs]
rouge  = E53935
orange = FB8C00
jaune  = FDD835
vert   = 7CB342
bleu   = 1E88E5
indigo = 5C6BC0

; --- Categories (libelle affiche dans la colonne "Categorie") -------
; cle = Libelle
[categories]
ident   = Identifiants
desc    = Description detaillee
expl    = Exploitation courante
secu    = Securite / acces
flux    = Echanges / livraison
reprise = Reprise / annexes

; --- Champs (UNE couleur par champ) ---------------------------------
; Libelle = categorie | couleur | type | mots-cles (separes par ;)
;
;   couleur = <teinte> <nuance>     ex: "jaune 2", "bleu clair", "vert fonce"
;             ou un hexa RRGGBB direct (ex: "FFAA00").
;   nuance  = 1 (tres clair) ... 5 (base) ... 9 (tres fonce)
;             ou les mots : tres clair / clair / moyen / fonce / tres fonce
;   type    = text | link | merge | appendix
;             | idsolution | idauteur | idresponsable  (identifiants)
;
; Les champs sont declines du CLAIR (haut de groupe) au plus FONCE.
[champs]
Numero de solution                     = ident   | rouge 2  | idsolution    |
Auteur                                 = ident   | rouge 4  | idauteur      |
Responsable                            = ident   | rouge 6  | idresponsable |
Lien Dossier Archi (DAP...)            = desc    | orange 2 | link     | architecture fonctionnelle applicative
Schema Applicatif (ADU...)             = desc    | orange 3 | link     | architecture fonctionnelle applicative ; description de la solution ; description fonctionnelle
Description Fonctionnelle              = desc    | orange 4 | text     | description de la solution ; description fonctionnelle
Donnees de la solution                 = desc    | orange 5 | text     | donnees
Description Technique                  = desc    | orange 6 | text     | architecture technique
Plage de fonctionnement / maintenance  = expl    | jaune 2  | text     | plage de fonctionnement ; plages de fonctionnement
Supervision                            = expl    | jaune 3  | text     | supervision
Observabilite                          = expl    | jaune 4  | text     | metrologie
Log                                    = expl    | jaune 5  | text     | diagnostic ; diagnostique ; log ; trace
Sauvegardes                            = expl    | jaune 6  | text     | sauvegarde
Servitudes et ordonnancements          = secu    | vert 2   | text     | servitude
Comptes et services                    = secu    | vert 3   | text     | compte de service ; comptes de service
Certificats                            = secu    | vert 4   | text     | certificat
Liste blanche                          = secu    | vert 5   | text     | liste blanche ; whitelist
Flux                                   = flux    | bleu 2   | text     | flux et interdependance ; flux et interdependances
Support                                = flux    | bleu 3   | text     | matrice de responsabilite ; matrice des responsabilites ; raci
Changement et MEP                      = flux    | bleu 4   | merge    | controle des operations ; changements et mep ; changement et mep
Matiere (repo)                         = flux    | bleu 5   | merge    | referentiel ; repository ; depot de code ; matiere
Procedure de restauration              = reprise | indigo 2 | text     | restauration
Procedure de reconstruction            = reprise | indigo 3 | text     | reconstruction
Procedure de resynchronisation         = reprise | indigo 4 | text     | resynchronisation
Informations supplementaires           = reprise | indigo 5 | appendix | assets mainframe
