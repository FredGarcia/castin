; ===================================================================
; AnnotationDEX.config.ini — configuration de la macro AnnotationDEX
; -------------------------------------------------------------------
; Placez ce fichier DANS LE MEME DOSSIER que le DEX a annoter (ou
; renseignez un chemin explicite dans la constante CONFIG_CHEMIN du
; module .bas). S'il est absent, la macro utilise ses valeurs par
; defaut (identiques a celles ci-dessous).
;
; Conseil : conservez des libelles SANS ACCENTS (lecture ANSI), ou
; enregistrez ce fichier en ANSI.
; ===================================================================

; --- Couleurs de surlignage, au format hexadecimal RVB (RRGGBB) -----
[couleurs]
ident  = FF9999
orange = FFB266
jaune  = FFEB78
vert   = 92D06E
bleu   = 8EB4E3
indigo = 9F9FE0

; --- Categories affichees dans la legende ---------------------------
; cle = Libelle de la categorie | cle_de_couleur
[categories]
ident   = Identifiants          | ident
desc    = Description detaillee  | orange
expl    = Exploitation courante  | jaune
secu    = Securite / acces       | vert
flux    = Echanges / livraison   | bleu
reprise = Reprise / annexes      | indigo

; --- Champs CAST'IN -------------------------------------------------
; Libelle du champ = cle_categorie | type | mots-cles (separes par ;)
; type = text | link | merge | appendix
; (Les identifiants — n# de solution, Auteur, Responsable — sont geres
;  a part et rattaches a la categorie "ident".)
[champs]
Lien Dossier Archi (DAP...)            = desc    | link     | architecture fonctionnelle applicative
Schema Applicatif (ADU...)             = desc    | link     | architecture fonctionnelle applicative ; description de la solution ; description fonctionnelle
Description Fonctionnelle              = desc    | text     | description de la solution ; description fonctionnelle
Donnees de la solution                 = desc    | text     | donnees
Description Technique                  = desc    | text     | architecture technique
Plage de fonctionnement / maintenance  = expl    | text     | plage de fonctionnement ; plages de fonctionnement
Supervision                            = expl    | text     | supervision
Observabilite                          = expl    | text     | metrologie
Log                                    = expl    | text     | diagnostic ; diagnostique ; log ; trace
Sauvegardes                            = expl    | text     | sauvegarde
Servitudes et ordonnancements          = secu    | text     | servitude
Comptes et services                    = secu    | text     | compte de service ; comptes de service
Certificats                            = secu    | text     | certificat
Liste blanche                          = secu    | text     | liste blanche ; whitelist
Flux                                   = flux    | text     | flux et interdependance ; flux et interdependances
Support                                = flux    | text     | matrice de responsabilite ; matrice des responsabilites ; raci
Changement et MEP                      = flux    | merge    | controle des operations ; changements et mep ; changement et mep
Matiere (repo)                         = flux    | merge    | referentiel ; repository ; depot de code ; matiere
Procedure de restauration              = reprise | text     | restauration
Procedure de reconstruction            = reprise | text     | reconstruction
Procedure de resynchronisation         = reprise | text     | resynchronisation
Informations supplementaires           = reprise | appendix | assets mainframe
